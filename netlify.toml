# Netlify configuration for the Lou Lou's + Foster's drink app.
# Netlify auto-detects Next.js, but this pins the Node version and the official
# Next.js runtime so builds are predictable. No other changes are needed.

[build]
  command = "next build"
  publish = ".next"

[build.environment]
  # Next.js 14 needs Node 18.17+. 20 is a safe, current choice.
  NODE_VERSION = "20"

# The official plugin that makes Next.js (server components, API routes, and the
# admin login middleware) run on Netlify. Netlify installs it automatically.
[[plugins]]
  package = "@netlify/plugin-nextjs"
